<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- SEO & Meta -->
  <title>UCL DataHub 2025-26 — Champions League Ao Vivo</title>
  <meta name="description" content="Acompanhe a UEFA Champions League 2025-26 ao vivo com dados reais, estatísticas avançadas, previsões de IA e bolão. Quartas de final hoje!">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UCL DataHub">

  <!-- PWA Manifest (reuse existing) -->
  <link rel="manifest" href="manifest-ucl.json">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>" type="image/svg+xml">

  <!-- Shared stylesheet -->
  <link rel="stylesheet" href="css/style.css">

  <!-- UCL Overrides -->
  <style>
    :root {
      /* UCL deep blue/purple palette */
      --color-ucl-navy: #0a1128;
      --color-ucl-blue: #1a237e;
      --color-ucl-star: #ffd700;
      --color-ucl-accent: #3f51b5;

      /* Override gold with UCL star gold */
      --gradient-hero: radial-gradient(ellipse at 50% 0%, rgba(63, 81, 181, 0.15), transparent 60%);
      --gradient-glow: radial-gradient(circle at 50% 0%, rgba(255, 215, 0, 0.08), transparent 60%);
    }

    body::before {
      background: var(--gradient-glow);
    }

    /* UCL Starball branding */
    .app-header__title {
      background: linear-gradient(135deg, #ffd700, #daa520);
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* Phase badge */
    .phase-badge {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(218,165,32,0.08));
      color: var(--color-ucl-star);
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid rgba(255,215,0,0.2);
    }

    /* Live pulse - stronger for today's matches */
    .live-now {
      color: var(--color-emerald);
      font-weight: 700;
      animation: liveGlow 2s infinite;
    }

    @keyframes liveGlow {
      0%, 100% { text-shadow: 0 0 4px rgba(16, 185, 129, 0.4); }
      50% { text-shadow: 0 0 12px rgba(16, 185, 129, 0.8); }
    }

    /* Bracket connector lines */
    .bracket-round {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      min-width: 200px;
    }

    .bracket-container {
      display: flex;
      gap: var(--space-xl);
      overflow-x: auto;
      padding: var(--space-lg) 0;
      scrollbar-width: thin;
      scrollbar-color: var(--color-bg-tertiary) transparent;
    }

    .bracket-match {
      background: var(--gradient-card);
      border: 1px solid var(--color-bg-glass-border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      min-width: 180px;
    }

    .bracket-match.today {
      border-color: rgba(16, 185, 129, 0.4);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
    }

    .bracket-match.completed {
      opacity: 0.75;
    }

    .bracket-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-xs) 0;
      font-size: var(--text-sm);
      font-weight: 500;
    }

    .bracket-team.winner {
      color: var(--color-ucl-star);
      font-weight: 700;
    }

    .bracket-team.eliminated {
      color: var(--color-text-muted);
      text-decoration: line-through;
      opacity: 0.6;
    }

    .bracket-team__info {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .bracket-team__score {
      font-family: var(--font-display);
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }

    .bracket-round-title {
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: var(--space-md);
    }

    .bracket-aggregate {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: center;
      margin-top: 2px;
    }

    /* API status indicator */
    .api-status {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      padding: var(--space-sm) var(--space-md);
    }

    .api-status__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-text-muted);
    }

    .api-status__dot.connected { background: var(--color-emerald); }
    .api-status__dot.error { background: var(--color-rose); }
    .api-status__dot.loading {
      background: var(--color-gold);
      animation: pulse 1s infinite;
    }

    /* Today's matches hero */
    .today-hero {
      background: linear-gradient(145deg, rgba(63,81,181,0.12), rgba(10,14,26,0.95));
      border: 1px solid rgba(63,81,181,0.2);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      margin-bottom: var(--space-xl);
      position: relative;
      overflow: hidden;
    }

    .today-hero::before {
      content: '⭐';
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 8rem;
      opacity: 0.04;
    }

    .today-hero__title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 800;
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .today-hero__subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-xl);
    }

    /* Match detail view */
    .match-detail {
      display: none;
    }

    .match-detail.active {
      display: block;
      animation: pageIn 0.35s ease;
    }

    .match-detail__back {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      padding: var(--space-sm) 0;
      margin-bottom: var(--space-lg);
      cursor: pointer;
    }

    .match-detail__back:hover {
      color: var(--color-text-primary);
    }

    /* Event timeline */
    .event-timeline {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      padding: var(--space-md) 0;
    }

    .event-item {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-sm) var(--space-md);
      font-size: var(--text-sm);
      border-left: 2px solid var(--color-bg-glass-border);
    }

    .event-item--goal {
      border-left-color: var(--color-emerald);
      background: var(--color-emerald-dim);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .event-item--card {
      border-left-color: var(--color-gold);
    }

    .event-item--red {
      border-left-color: var(--color-rose);
    }

    .event-item--sub {
      border-left-color: var(--color-blue);
    }

    .event-item__minute {
      font-family: var(--font-display);
      font-weight: 700;
      min-width: 32px;
      color: var(--color-text-muted);
    }

    .event-item__icon {
      font-size: 1rem;
      min-width: 20px;
    }

    /* Refresh button */
    .btn-refresh {
      position: fixed;
      bottom: calc(var(--nav-height) + var(--safe-area-bottom) + 16px);
      right: var(--space-lg);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--gradient-blue);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-lg), var(--shadow-glow-blue);
      z-index: 50;
      transition: transform var(--transition-base);
      cursor: pointer;
    }

    .btn-refresh:active { transform: scale(0.9); }
    .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Shimmer for loading */
    .shimmer {
      background: linear-gradient(90deg, var(--color-bg-glass) 25%, var(--color-bg-tertiary) 50%, var(--color-bg-glass) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .shimmer-card {
      height: 120px;
      margin-bottom: var(--space-md);
    }
  </style>
</head>

  <!-- ── Application Script (inline for self-contained) ── -->
  <script type="module">
    // =========================================================================
    // UCL DataHub 2025-26 — Champions League App with Real Data
    // =========================================================================

    // ── API Configuration ──
    const API_CONFIG = {
      // API-Football v3 via RapidAPI (free tier: 100 req/day)
      baseUrl: 'https://v3.football.api-sports.io',
      // Alternative: 'https://api-football-v1.p.rapidapi.com/v3'
      key: '', // User will set this in settings
      leagueId: 2, // Champions League
      season: 2025,
      headers: function() {
        if (!this.key) return null;
        return {
          'x-apisports-key': this.key
          // For RapidAPI use: 'x-rapidapi-host': 'api-football-v1.p.rapidapi.com', 'x-rapidapi-key': key
        };
      }
    };

    // ── Real UCL 2025-26 Data (hardcoded for instant load, API updates live) ──
    const UCL_TEAMS = {
      BAY: { name: 'Bayern Munich', short: 'BAY', logo: '🔴', country: '🇩🇪', color: '#dc2626' },
      RMA: { name: 'Real Madrid', short: 'RMA', logo: '⚪', country: '🇪🇸', color: '#fbbf24' },
      ARS: { name: 'Arsenal', short: 'ARS', logo: '🔴', country: '🏴\u200D☠️', color: '#ef4444' },
      SPO: { name: 'Sporting CP', short: 'SPO', logo: '🟢', country: '🇵🇹', color: '#22c55e' },
      PSG: { name: 'Paris Saint-Germain', short: 'PSG', logo: '🔵', country: '🇫🇷', color: '#3b82f6' },
      LIV: { name: 'Liverpool', short: 'LIV', logo: '🔴', country: '🏴\u200D☠️', color: '#dc2626' },
      BAR: { name: 'Barcelona', short: 'BAR', logo: '🔵', country: '🇪🇸', color: '#1d4ed8' },
      ATM: { name: 'Atlético Madrid', short: 'ATM', logo: '🔴', country: '🇪🇸', color: '#dc2626' },
      // Semi-final qualified
    };

    // Quarterfinal results (real data)
    const QF_MATCHES = [
      {
        id: 'qf1',
        home: 'RMA', away: 'BAY',
        leg1: { home: 1, away: 2, venue: 'Santiago Bernabéu', date: '2026-04-07' },
        leg2: { home: null, away: null, venue: 'Allianz Arena', date: '2026-04-15', time: '16:00', status: 'TODAY' },
        aggregate: { home: null, away: null },
        winner: null
      },
      {
        id: 'qf2',
        home: 'SPO', away: 'ARS',
        leg1: { home: 0, away: 1, venue: 'Estádio José Alvalade', date: '2026-04-07' },
        leg2: { home: null, away: null, venue: 'Emirates Stadium', date: '2026-04-15', time: '16:00', status: 'TODAY' },
        aggregate: { home: null, away: null },
        winner: null
      },
      {
        id: 'qf3',
        home: 'PSG', away: 'LIV',
        leg1: { home: 2, away: 0, venue: 'Parc des Princes', date: '2026-04-08' },
        leg2: { home: 1, away: 0, venue: 'Anfield', date: '2026-04-09', time: '16:00', status: 'FT' },
        aggregate: { home: 2, away: 1 },
        winner: 'PSG'
      },
      {
        id: 'qf4',
        home: 'BAR', away: 'ATM',
        leg1: { home: 0, away: 2, venue: 'Camp Nou', date: '2026-04-08' },
        leg2: { home: 3, away: 2, venue: 'Metropolitano', date: '2026-04-09', time: '16:00', status: 'FT' },
        aggregate: { home: 5, away: 2 },
        winner: 'BAR'
      }
    ];

    // Semi-final draw
    const SF_MATCHES = [
      { id: 'sf1', home: null, away: null, leg1: { date: '2026-04-28' }, leg2: { date: '2026-05-05' }, status: 'TBD' },
      { id: 'sf2', home: null, away: null, leg1: { date: '2026-04-29' }, leg2: { date: '2026-05-06' }, status: 'TBD' }
    ];

    const FINAL = {
      venue: 'Puskás Aréna, Budapeste 🇭🇺',
      date: '2026-05-30',
      home: null, away: null, status: 'TBD'
    };

    // Key dates
    const KEY_DATES = {
      qfLeg2: '2026-04-15',
      sfLeg1: '2026-04-28',
      sfLeg2: '2026-05-05',
      final: '2026-05-30'
    };

    // ── State ──
    let appState = loadState();
    let liveData = null;
    let pollInterval = null;
    let currentPage = 'today';

    function loadState() {
      try {
        const raw = localStorage.getItem('ucl_datahub_state');
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return {
        apiKey: 'ec01475ea2eeb3485b0664b8ae9cd21e',
        predictions: {},
        xp: 0,
        level: 1,
        favoriteTeam: null,
        lastRefresh: null,
        cachedLiveData: null
      };
    }

    function saveState() {
      localStorage.setItem('ucl_datahub_state', JSON.stringify(appState));
    }

    // ── API Layer ──
    async function fetchFromAPI(endpoint, params = {}) {
      if (!appState.apiKey) return null;

      const url = new URL(`${API_CONFIG.baseUrl}/${endpoint}`);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));

      try {
        const resp = await fetch(url, {
          headers: { 'x-apisports-key': appState.apiKey }
        });
        if (!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        return data.response || data;
      } catch (err) {
        console.error('API Error:', err);
        setApiStatus('error', `Erro: ${err.message}`);
        return null;
      }
    }

    async function fetchLiveFixtures() {
      setApiStatus('loading', 'Atualizando...');

      // Try live data first (most reliable for free tier)
      let data = await fetchFromAPI('fixtures', {
        live: 'all',
        league: API_CONFIG.leagueId
      });

      // If no live matches, fallback to today's schedule
      if (!data || data.length === 0) {
        data = await fetchFromAPI('fixtures', {
          league: API_CONFIG.leagueId,
          season: API_CONFIG.season,
          date: '2026-04-15'
        });
      }

      if (data && data.length > 0) {
        liveData = data;
        appState.cachedLiveData = data;
        appState.lastRefresh = Date.now();
        saveState();
        setApiStatus('connected', `Atualizado ${new Date().toLocaleTimeString('pt-BR')}`);
        renderCurrentPage();
        return data;
      }

      setApiStatus('connected', 'Conectado · Sem jogos agora');
      return null;
    }

    async function fetchFixtureStats(fixtureId) {
      return await fetchFromAPI('fixtures/statistics', { fixture: fixtureId });
    }

    async function fetchFixtureEvents(fixtureId) {
      return await fetchFromAPI('fixtures/events', { fixture: fixtureId });
    }

    function setApiStatus(status, text) {
      const dot = document.getElementById('api-dot');
      const label = document.getElementById('api-text');
      if (dot) {
        dot.className = `api-status__dot ${status}`;
      }
      if (label) label.textContent = text;
    }

    // ── Toast ──
    function showToast(msg, type = 'success', duration = 3000) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const icons = { success: '✅', error: '❌', xp: '⚡', info: 'ℹ️' };
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.innerHTML = `<span class="toast__icon toast__icon--${type}">${icons[type]}</span><span class="toast__message">${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 300); }, duration);
    }

    // ── XP System ──
    const LEVEL_XP = [0, 50, 150, 300, 500, 800, 1200, 1700, 2500, 3500, 5000];
    function addXP(amount) {
      const oldLevel = appState.level;
      appState.xp += amount;
      let newLevel = 1;
      for (let i = LEVEL_XP.length - 1; i >= 0; i--) {
        if (appState.xp >= LEVEL_XP[i]) { newLevel = i + 1; break; }
      }
      appState.level = newLevel;
      saveState();
      if (newLevel > oldLevel) showToast(`🎉 Subiu para Nível ${newLevel}!`, 'xp');
    }

    function getXPPercent() {
      const curr = LEVEL_XP[appState.level - 1] || 0;
      const next = LEVEL_XP[appState.level] || LEVEL_XP[LEVEL_XP.length - 1] * 1.5;
      return Math.min(100, Math.round(((appState.xp - curr) / (next - curr)) * 100));

    function renderLiveMatchFromAPI(apiMatch) {
      const fixture = apiMatch.fixture;
      const teams = apiMatch.teams;
      const goals = apiMatch.goals;
      const score = apiMatch.score;

      const statusMap = {
        'NS': 'Não iniciado',
        '1H': '1º Tempo',
        'HT': 'Intervalo',
        '2H': '2º Tempo',
        'ET': 'Prorrogação',
        'P': 'Pênaltis',
        'FT': 'Encerrado',
        'AET': 'Enc. (Prorrogação)',
        'PEN': 'Enc. (Pênaltis)',
        'LIVE': 'AO VIVO'
      };

      const isLive = ['1H', '2H', 'ET', 'P', 'LIVE'].includes(fixture.status?.short);
      const statusText = statusMap[fixture.status?.short] || fixture.status?.short || 'Agendado';
      const elapsed = fixture.status?.elapsed || '';

      return `
        <div class="card ${isLive ? 'card--gold' : ''} mb-lg" data-fixture-id="${fixture.id}">
          <div class="match-card">
            <div class="match-card__header">
              <span class="phase-badge">Quartas · 2ª Mão</span>
              <span class="match-card__status ${isLive ? 'live' : ''}">
                ${isLive ? `AO VIVO · ${elapsed}'` : statusText}
              </span>
            </div>
            <div class="match-card__teams" style="padding: var(--space-lg) 0;">
              <div class="match-card__team">
                ${teams.home?.logo ? `<img src="${teams.home.logo}" alt="${teams.home.name}" style="width:40px;height:40px;">` : `<span style="font-size:2.5rem;">⚽</span>`}
                <span class="match-card__name">${teams.home?.name || 'Home'}</span>
              </div>
              <div class="match-card__score">
                <span>${goals.home ?? '-'}</span>
                <span class="match-card__score-sep">:</span>
                <span>${goals.away ?? '-'}</span>
              </div>
              <div class="match-card__team">
                ${teams.away?.logo ? `<img src="${teams.away.logo}" alt="${teams.away.name}" style="width:40px;height:40px;">` : `<span style="font-size:2.5rem;">⚽</span>`}
                <span class="match-card__name">${teams.away?.name || 'Away'}</span>
              </div>
            </div>
            ${score?.halftime ? `
              <div class="text-xs text-center text-muted">
                HT: ${score.halftime.home ?? '-'} - ${score.halftime.away ?? '-'}
                ${score.extratime?.home !== null ? ` · ET: ${score.extratime.home}-${score.extratime.away}` : ''}
                ${score.penalty?.home !== null ? ` · PEN: ${score.penalty.home}-${score.penalty.away}` : ''}
              </div>
            ` : ''}
            <div class="text-xs text-center text-muted mt-sm">
              📍 ${fixture.venue?.name || ''}, ${fixture.venue?.city || ''}
            </div>
          </div>
        </div>
      `;
    }

                `;
              }).join('')}
            </tbody>
          </table>
        </div>

        <!-- R16 Results Summary -->
        <div class="card mb-xl">
          <div class="group-card__title" style="font-size: var(--text-lg);">
            🏟️ Oitavas de Final — Resultados
          </div>
          <div style="display: flex; flex-direction: column; gap: var(--space-sm); padding: var(--space-sm) 0;">
            ${[
              { h: 'SPO', a: 'Bodø/Glimt', score: '5-0' },
              { h: 'ARS', a: 'B. Leverkusen', score: '2-0' },
              { h: 'PSG', a: 'Chelsea', score: '3-0' },
              { h: 'RMA', a: 'Man. City', score: '2-1' },
              { h: 'BAR', a: 'Newcastle', score: '7-2' },
              { h: 'BAY', a: 'Atalanta', score: '4-1' },
              { h: 'LIV', a: 'Galatasaray', score: '4-0' },
              { h: 'ATM', a: 'Tottenham', score: '3-2' },
            ].map(r => `
              <div class="flex items-center justify-between" style="padding: var(--space-xs) var(--space-sm); font-size: var(--text-sm);">
                <span class="font-display" style="font-weight: 600;">${team(r.h)?.logo || '⚽'} ${r.h}</span>
                <span class="font-display" style="font-weight: 700; color: var(--color-ucl-star);">${r.score}</span>
                <span class="text-muted">${r.a}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- Key Dates -->
        <div class="card">
          <div class="group-card__title" style="font-size: var(--text-lg);">📅 Próximas Datas</div>
          <div style="display: flex; flex-direction: column; gap: var(--space-md); padding: var(--space-sm) 0;">
            <div class="flex items-center justify-between">
              <span class="text-sm">Quartas 2ª Mão</span>
              <span class="phase-badge" style="background: var(--color-emerald-dim); color: var(--color-emerald); border-color: rgba(16,185,129,0.2);">HOJE</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm">Semifinais 1ª Mão</span>
              <span class="text-sm text-muted">28-29 Abr</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm">Semifinais 2ª Mão</span>
              <span class="text-sm text-muted">5-6 Mai</span>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm font-bold" style="color: var(--color-ucl-star);">🏆 Final — Budapeste</span>
              <span class="text-sm" style="color: var(--color-ucl-star);">30 Mai</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderSettings() {
      return `
        <div class="section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--color-gold)"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          Configurações
        </div>

        <!-- API Key -->
        <div class="settings-group">
          <div class="settings-group__title">🔑 API-Football (Dados ao vivo)</div>

          <div class="card mb-md" style="padding: var(--space-xl);">
            <div class="font-display font-bold mb-sm" style="font-size: var(--text-sm);">API Key</div>
            <div class="text-xs text-muted mb-md">
              Gratuita em <a href="https://www.api-football.com" target="_blank" style="color: var(--color-blue);">api-football.com</a> (100 req/dia).
              A chave fica salva apenas no seu navegador.
            </div>
            <input type="text" class="welcome-name-input" id="api-key-input"
                   style="text-align: left; width: 100%; max-width: 100%;"
                   placeholder="Cole sua API key aqui..."
                   value="${appState.apiKey}">
            <button class="btn btn--primary btn--sm btn--full mt-md" id="save-api-key">
              💾 Salvar & Testar Conexão
            </button>
            <div id="api-test-result" class="text-xs text-center mt-sm"></div>
          </div>

          <div class="card mb-md">
            <div class="font-display font-bold mb-sm" style="font-size: var(--text-sm);">Como funciona</div>
            <div class="text-xs text-secondary" style="line-height: 1.6;">
              1. Crie uma conta gratuita em api-football.com<br>
              2. Copie sua API Key do dashboard<br>
              3. Cole aqui e clique em "Salvar & Testar"<br>
              4. O app atualiza automaticamente a cada 60s durante jogos ao vivo<br><br>
              <strong style="color: var(--color-gold);">Sem API Key:</strong> O app funciona com dados estáticos (resultados das idas, horários dos jogos). Com a key, dados ao vivo aparecem em tempo real.
            </div>
          </div>
        </div>

        <!-- About -->
        <div class="settings-group">
          <div class="settings-group__title">Sobre</div>
          <div class="settings-item">
            <div class="settings-item__left">
              <span style="font-size: 1.2rem;">⭐</span>
              <div>
                <div class="settings-item__label">UCL DataHub 2025-26</div>
                <div class="settings-item__desc">Champions League · Dados Reais · PWA</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Reset -->
        <div class="mt-xl text-center">
          <button class="btn btn--ghost btn--sm text-rose" id="btn-reset">
            Resetar todos os dados
          </button>
        </div>
      `;
    }

    // ── ROUTER ──
    function renderCurrentPage() {
      const container = document.getElementById('page-container');
      const renderers = {
        today: renderToday,
        bracket: renderBracket,
        bolao: renderBolao,
        stats: renderStats,
        settings: renderSettings
      };

      const renderer = renderers[currentPage];
      if (renderer) {
        container.innerHTML = renderer();
        window.scrollTo(0, 0);
        bindPageEvents();
      }
    }

    function navigate(route) {
      currentPage = route;
      window.location.hash = `#${route}`;
      renderCurrentPage();
      updateNavHighlight(route);
    }

    function updateNavHighlight(route) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.toggle('active', item.dataset.route === route);
      });
    }

    // ── Event Binding ──
    function bindPageEvents() {
      // Save bolão prediction
      document.querySelectorAll('.save-bolao').forEach(btn => {
        btn.addEventListener('click', () => {
          const matchId = btn.dataset.match;
          const homeInput = document.querySelector(`input[data-match="${matchId}"][data-side="home"]`);
          const awayInput = document.querySelector(`input[data-match="${matchId}"][data-side="away"]`);
          if (homeInput && awayInput) {
            appState.predictions[matchId] = {
              home: parseInt(homeInput.value) || 0,
              away: parseInt(awayInput.value) || 0,
              timestamp: Date.now()
            };
            saveState();
            addXP(25);
            showToast('⚽ Palpite salvo! +25 XP', 'xp');
          }
        });
      });

      // Predict winner buttons
      document.querySelectorAll('[data-predict-winner]').forEach(btn => {
        btn.addEventListener('click', () => {
          const matchId = btn.dataset.predictWinner;
          const winner = btn.dataset.winner;
          appState.predictions[`${matchId}_winner`] = winner;
          saveState();
          showToast(`⭐ ${team(winner).name} como classificado!`, 'success');
        });
      });

      // Champion pick
      document.querySelectorAll('.champion-pick').forEach(btn => {
        btn.addEventListener('click', () => {
          const code = btn.dataset.champion;
          appState.predictions.champion = code;
          saveState();
          addXP(50);
          showToast(`🏆 ${team(code).name} como campeão! +50 XP`, 'xp');
          navigate('bolao'); // re-render
        });
      });

      // Bolão sub-tabs
      const bolaoTabs = document.getElementById('bolao-tabs');
      if (bolaoTabs) {
        bolaoTabs.addEventListener('click', (e) => {
          const btn = e.target.closest('.sub-tab');
          if (!btn) return;
          const tab = btn.dataset.tab;
          bolaoTabs.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-palpites').style.display = tab === 'palpites' ? 'block' : 'none';
          document.getElementById('tab-campeao').style.display = tab === 'campeao' ? 'block' : 'none';
        });
      }

      // Settings: API key save
      const saveApiBtn = document.getElementById('save-api-key');
      if (saveApiBtn) {
        saveApiBtn.addEventListener('click', async () => {
          const input = document.getElementById('api-key-input');
          const result = document.getElementById('api-test-result');
          if (!input || !result) return;

          const key = input.value.trim();
          if (!key) {
            result.innerHTML = '<span style="color:var(--color-rose);">❌ Insira uma API key</span>';
            return;
          }

          appState.apiKey = key;
          saveState();
          result.innerHTML = '<span style="color:var(--color-gold);">🔄 Testando conexão...</span>';

          // Test the API
          const testData = await fetchFromAPI('status');
          if (testData) {
            result.innerHTML = '<span style="color:var(--color-emerald);">✅ Conectado! Dados ao vivo ativados.</span>';
            showToast('✅ API conectada! Dados ao vivo ativados.', 'success');
            startLivePolling();
          } else {
            result.innerHTML = '<span style="color:var(--color-rose);">❌ Falha na conexão. Verifique a key.</span>';
          }
        });
      }

      // Settings: Reset
      const resetBtn = document.getElementById('btn-reset');
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          if (confirm('Resetar todos os dados (XP, palpites, API key)?')) {
            localStorage.removeItem('ucl_datahub_state');
            window.location.reload();
          }
        });
      }
    }

    // ── Live Polling ──
    function startLivePolling() {
      if (pollInterval) clearInterval(pollInterval);
      if (!appState.apiKey) return;

      // Initial fetch
      fetchLiveFixtures();

      // Poll every 60 seconds
      pollInterval = setInterval(() => {
        fetchLiveFixtures();
      }, 60000);
    }

    // ── Init ──
    function init() {
      // Nav clicks
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          navigate(item.dataset.route);
        });
      });

      // Refresh button
      document.getElementById('btn-refresh')?.addEventListener('click', async () => {
        const btn = document.getElementById('btn-refresh');
        btn.classList.add('spinning');
        if (appState.apiKey) {
          await fetchLiveFixtures();
          showToast('🔄 Dados atualizados!', 'success');
        } else {
          showToast('⚠️ Configure uma API key em Config para dados ao vivo', 'info');
          renderCurrentPage();
        }
        setTimeout(() => btn.classList.remove('spinning'), 800);
      });

      // Handle hash navigation
      const hash = window.location.hash.slice(1);
      if (hash && ['today', 'bracket', 'bolao', 'stats', 'settings'].includes(hash)) {
        currentPage = hash;
      }

      // Initial render
      renderCurrentPage();
      updateNavHighlight(currentPage);

      // Set API status
      if (appState.apiKey) {
        setApiStatus('connected', 'API configurada');
        startLivePolling();
      } else {
        setApiStatus('error', 'Sem API key');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
